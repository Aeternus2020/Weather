<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Page Not Found | Forecast Atlas</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Manrope", "IBM Plex Sans", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #edf3fb 0%, #dde8f6 100%);
            color: #132b52;
        }

        main {
            width: min(640px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 18px;
            border: 1px solid rgba(19, 43, 82, 0.1);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 20px 48px rgba(12, 24, 42, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font: 700 2.4rem/1.02 "Sora", "Manrope", sans-serif;
        }

        p {
            margin: 0 0 20px;
            color: #4f6789;
            font-size: 1rem;
            line-height: 1.5;
        }

        a {
            color: #2a74d8;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main>
    <h1>Page not found</h1>
    <p>The page you requested does not exist in Forecast Atlas.</p>
    <a href="/">Back to Forecast Atlas</a>
</main>
</body>
</html>
