<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
        name="description"
        content="Compare observed temperatures and forecast providers for London in Forecast Atlas."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://forecast-atlas.web.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
        rel="stylesheet"
    />
    <style>
        :root {
            color-scheme: light;
            font-family: "Manrope", "IBM Plex Sans", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f8fc;
            color: #132b52;
        }

        .fallback {
            width: min(720px, calc(100vw - 32px));
            margin: 32px auto;
        }

        .fallback nav {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 16px 0 0;
        }

        .fallback a {
            color: #1f72d6;
            font-weight: 700;
        }

        .fallback h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 8vw, 3rem);
            line-height: 1.04;
        }

        .fallback p {
            margin: 0;
            max-width: 70ch;
            color: #4f6789;
            line-height: 1.55;
        }

        .fallback nav + p {
            margin-top: 16px;
        }
    </style>
    <title>London Forecast Comparison | Forecast Atlas</title>
    <script type="application/ld+json" data-seo-structured-data="page">
        {
            "@context": "https://schema.org",
            "@graph": [
                {
                    "@type": "WebSite",
                    "@id": "https://forecast-atlas.web.app/#website",
                    "url": "https://forecast-atlas.web.app/",
                    "name": "Forecast Atlas"
                },
                {
                    "@type": "WebPage",
                    "@id": "https://forecast-atlas.web.app/#webpage",
                    "url": "https://forecast-atlas.web.app/",
                    "name": "London Forecast Comparison",
                    "description": "Compare observed temperatures and forecast providers for London in Forecast Atlas.",
                    "isPartOf": {
                        "@id": "https://forecast-atlas.web.app/#website"
                    }
                }
            ]
        }
    </script>
</head>
<body>
<div id="root">
    <main class="fallback">
        <h1>London Forecast Comparison</h1>
        <p>
            Compare observed temperatures and public forecast providers for London in Forecast Atlas.
        </p>
        <nav aria-label="Public pages">
            <a href="/london/">London</a>
            <a href="/ny/">New York</a>
        </nav>
        <p>
            The root route opens London by default. Use the city links to switch between public routes.
        </p>
    </main>
</div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
